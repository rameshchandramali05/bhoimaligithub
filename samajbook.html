<!-- Fancy box  start -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css" />
<!-- <title>Multi Accordion WebApp</title> -->

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0
  }

  .accordion {
    background: #3498db;
    color: white;
    cursor: pointer;
    padding: 12px;
    width: 95%;
    border: none;
    margin: 5px 0;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: .3s
  }

  .accordion:hover {
    background: #2980b9
  }

  .accordion .arrow {
    transition: transform .3s
  }

  .accordion.open .arrow {
    transform: rotate(90deg)
  }

  .accordion.active {
    background: #1d6fa5
  }

  .accordion .dot {
    margin-bottom: 2px;
    margin-right: 10px;
    width: 10px;
    height: 10px;
    background: #2ecc71;
    border-radius: 50%;
    display: inline-block;
    opacity: 0;
    transform: scale(0);
    transition: .3s
  }

  .accordion.active .dot {
    opacity: 1;
    transform: scale(1)
  }

  .panel {
    display: none;
    width: 95%;
    padding: 4px;
    background: #f1f1f1;
    border-radius: 5px;
    margin-bottom: 4px
  }

  .panel button {
    margin: 2px 0;
    padding: 3px;
    width: 80%;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: .3s
  }

  .panel button:hover {
    background: #27ae60
  }

  .panel button.active {
    background: #1e8449;
    position: relative
  }

  .panel button.active::after {
    content: "✔";
    position: absolute;
    right: 10px
  }

  .loader {
    border: 6px solid #f3f3f3;
    border-top: 6px solid #3498db;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto
  }

  @keyframes spin {
    0% {
      transform: rotate(0)
    }

    100% {
      transform: rotate(360deg)
    }
  }


  .pageContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 1px;
    margin: 0px auto;
    justify-content: center;
    border: 2px solid white;
    padding: 0px
  }

  .leftBox {
    flex: 0 0 25%;
    /* background:#ffeaa7; */
    background-color: #f8b400;
    padding: 0px
  }

  .midBox {
    flex: 0 0 49%;
    /* background:#55efc4; */
    background-color: #4caf50;
    padding: 0px
  }

  .rightBox {
    flex: 0 0 25%;
    /* background:#74b9ff; */
    background-color: #2196f3;

    padding: 0px
  }

  /* #contentBoxA,#contentBoxB{min-height:100px;padding:12px;border:1px solid #aaa;border-radius:5px;background:#fff} */


  .pageContainer {
    display: flex;
    flex-wrap: wrap;
    /* Mobile ke liye wrapping allow kare */
    gap: 3px;
    /* Container ke beech space */
    justify-content: center;
    /* Screen ke center me laane ke liye */
  }

  .box {
    padding: 20px;
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    box-sizing: border-box;
  }




  /* Responsive: Mobile par vertically stack kare */
  @media (max-width: 768px) {

    .leftBox,
    .midBox,
    .rightBox {
      flex: 0 0 100%;
    }

    /* Mobile ke liye order change */
    .rightBox {
      order: 1;
    }

    .leftBox {
      order: 2;
    }

    .midBox {
      order: 3;
    }
  }




  .textdecorat {
    display: inline-block;
    font-family: 'Noto Serif Devanagari', serif;
    white-space: nowrap;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    line-height: 1.6em;
    text-shadow: 0 0 5px #fff,
      0 0 10px #ff00de,
      0 0 20px #ff00de,
      0 0 40px #ff00de,
      0 0 80px #ff00de;
    /* padding-right: 50px; /* text के बीच gap */
  }
</style>

  <!-- CSS -->
  <style>
    .rightBox .list-group-item {

      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }

    /* Hover underline only */
    .rightBox .list-group-item:hover::after {
      width: 100%;
      left: 0;
    }

    /* Active state: background + underline */
    .rightBox .list-group-item.active {
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      color: #fff !important;
    }

    .rightBox .list-group-item::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 0;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 200% 100%;
      transition: width 0.4s ease, left 0.4s ease;
      transform: translateX(-50%);
    }
  </style>
