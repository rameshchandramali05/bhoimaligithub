
<style>
  /* ---- RightBox Button Hover Style ---- */
.rightBox .list-group-item {
  transition: background 0.3s, color 0.3s;
}

/* Hover पर सिर्फ background और text color बदले */
.rightBox .list-group-item:hover {
  background: #343a40 !important; /* Dark gray/black background */
  color: #fff !important;        /* White text */
}

/* Active पर अलग रंग */
.rightBox .list-group-item.active {
  background: #0d6efd !important; /* Bootstrap Blue */
  color: #fff !important;
}

/* 👉 Underline effect हटाओ (अगर पहले वाले global underline CSS से लग रहा है तो override करो) */
.rightBox .list-group-item::after {
  content: none !important;
}



/* Right Box buttons base style */
.rightBox .list-group-item {
  background: linear-gradient(45deg, #28a745, #218838); /* default gradient */
  color: white;
  border: none;
  transition: all 0.4s ease;
  text-decoration: none !important; /* underline हटाओ */
}

/* Hover effect */
.rightBox .list-group-item:hover {
  background: linear-gradient(45deg, #20c997, #0d6efd); /* hover पर gradient */
  color: #fff;
  transform: scale(1.03); /* हल्का zoom effect */
  text-decoration: none !important;
}

/* Disable state को भी gradient में neutral रखो */
.rightBox .list-group-item.disabled {
  background: linear-gradient(45deg, #6c757d, #495057);
  color: #ddd !important;
  cursor: not-allowed;
  opacity: 0.7;
}
</style>
